    <script>
        function isMobile() {
            return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        }
    
        function openDate(memberId) {
            const hiddenInput = document.getElementById(`date-${memberId}`);
            if (!hiddenInput) {
                alert("❌ Hidden input not found");
                return;
            }
    
            if (!isMobile()) {
                if (typeof hiddenInput.showPicker === 'function') {
                    hiddenInput.showPicker();
                } else {
                    hiddenInput.focus();
                }
                return;
            }
    
            const existingInput = document.getElementById(`live-date-${memberId}`);
            if (existingInput) return;
    
            const wrapper = document.createElement('div');
            wrapper.id = `wrapper-${memberId}`;
            Object.assign(wrapper.style, {
                position: 'fixed',
                left: '50%',
                top: '50%',
                transform: 'translate(-50%, -50%)',
                zIndex: '9999',
                background: '#fff',
                padding: '16px',
                border: '2px solid #3498db',
                borderRadius: '10px',
                boxShadow: '0 4px 10px rgba(0,0,0,0.2)',
                textAlign: 'center'
            });
    
            // Group container for label + input
            const inputGroup = document.createElement('div');
            inputGroup.style.display = 'flex';
            inputGroup.style.flexDirection = 'column';
            inputGroup.style.alignItems = 'flex-start';
            inputGroup.style.marginBottom = '12px';
            inputGroup.style.width = '100%';
    
            const label = document.createElement('label');
            label.setAttribute('for', `live-date-${memberId}`);
            label.textContent = "📅 Choose a Date:";
            Object.assign(label.style, {
                fontSize: '16px',
                color: '#2c3e50',
                fontFamily: 'Poppins, sans-serif',
                marginBottom: '6px'
            });
    
            const input = document.createElement('input');
            input.type = 'date';
            input.id = `live-date-${memberId}`;
            input.name = 'date';
            input.min = hiddenInput.min;
            input.required = true;
            Object.assign(input.style, {
                fontSize: '16px',
                padding: '10px',
                border: '1px solid #ccc',
                borderRadius: '6px',
                width: '100%',
                background: '#f9f9f9'
            });
    
            inputGroup.appendChild(label);
            inputGroup.appendChild(input);
    
            const submitBtn = document.createElement('button');
            submitBtn.textContent = 'Submit';
            Object.assign(submitBtn.style, {
                fontSize: '16px',
                padding: '10px 16px',
                background: '#3498db',
                color: '#fff',
                border: 'none',
                borderRadius: '6px',
                cursor: 'pointer'
            });
    
            submitBtn.onclick = () => {
                if (!input.value) {
                    alert("❌ Please select a date first.");
                    return;
                }
    
                const selected = new Date(input.value);
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const minDate = new Date(today.getTime() + 21 * 86400000);
    
                if (selected < minDate) {
                    alert("❌ Please choose a date at least 3 weeks from today.");
                    return;
                }
    
                hiddenInput.value = input.value;
                const form = hiddenInput.closest('form');
                if (form) form.submit();
                wrapper.remove();
            };
    
            const cancelBtn = document.createElement('button');
            cancelBtn.textContent = 'Cancel';
            Object.assign(cancelBtn.style, {
                marginLeft: '12px',
                fontSize: '16px',
                padding: '10px 16px',
                background: '#ccc',
                color: '#000',
                border: 'none',
                borderRadius: '6px',
                cursor: 'pointer'
            });
    
            cancelBtn.onclick = () => wrapper.remove();
    
            wrapper.appendChild(inputGroup);
            wrapper.appendChild(submitBtn);
            wrapper.appendChild(cancelBtn);
            document.body.appendChild(wrapper);
        }
    </script>
